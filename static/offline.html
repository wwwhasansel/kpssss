<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baglanti Bekleniyor</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #eef2f7;
      color: #1a2332;
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }
    .card {
      width: min(92vw, 420px);
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 12px 36px rgba(21, 101, 192, 0.12);
      text-align: center;
    }
    .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 1.35rem;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: #5a6a85;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📶</div>
    <h1>Baglanti Bekleniyor</h1>
    <p>Uygulama su anda internete ulasamiyor. Baglanti geri geldiginde ana sayfa yeniden acilabilir.</p>
  </div>
</body>
</html>
